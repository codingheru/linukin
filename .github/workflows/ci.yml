name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Node.js checks ──────────────────────────────────────────────
  node-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (node --check on all JS files)
        run: |
          find . -name "*.js" -not -path "./node_modules/*" -exec node --check {} \;
        continue-on-error: true

      - name: "Lint check (optional)"
        run: npm run lint 2>/dev/null || echo "No lint script found, skipping"

  # ── Python checks ────────────────────────────────────────────────
  python-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax check Python files
        run: |
          python -m py_compile lib/face_crop_video.py
          python -m py_compile lib/whisper_transcribe.py
          python -m py_compile lib/mediapipe_detect.py
        continue-on-error: true

  # ── Basic server smoke test ──────────────────────────────────────
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Smoke test — server starts without crash
        run: |
          export TABLE_SHARE_APPS_SCRIPT_URL="https://example.com/dummy"
          export PORT=3001
          # Start server, wait 3s, check if still running using ps
          node server.js &
          sleep 3
          if ps aux | grep -v grep | grep "node server.js" > /dev/null; then
            echo "✅ Server is alive"
            pkill -f "node server.js" || true
          else
            echo "❌ Server crashed"
            exit 1
          fi
